<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio Bjør — Divider Crop Editor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #1a1916; color: #e8e0d0; padding: 24px; }
    h1 { font-size: 14px; letter-spacing: 0.2em; text-transform: uppercase; color: #b86818; margin-bottom: 24px; font-weight: 400; }
    .divider-editor { margin-bottom: 40px; border: 0.5px solid rgba(200,168,112,0.2); border-radius: 4px; overflow: hidden; }
    .editor-header { padding: 12px 16px; background: rgba(200,168,112,0.06); display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid rgba(200,168,112,0.15); }
    .editor-title { font-size: 12px; letter-spacing: 0.1em; color: #b86818; }
    .preview-strip { width: 100%; height: 100px; overflow: hidden; position: relative; border-top: 2px solid #b86818; border-bottom: 2px solid #b86818; background: #111; }
    .preview-strip img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .controls { padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; background: rgba(0,0,0,0.3); }
    .control-group { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 11px; color: rgba(200,168,112,0.6); letter-spacing: 0.08em; }
    input[type=range] { width: 100%; accent-color: #b86818; }
    .val { font-size: 12px; color: #e8e0d0; font-variant-numeric: tabular-nums; }
    .height-control { grid-column: 1 / -1; }
    .output-box { margin: 12px 16px 16px; padding: 12px; background: rgba(0,0,0,0.4); border-radius: 3px; font-family: monospace; font-size: 11px; color: #b86818; border: 0.5px solid rgba(184,104,24,0.3); cursor: pointer; user-select: all; }
    .output-box:hover { background: rgba(184,104,24,0.08); }
    .copy-hint { font-size: 10px; color: rgba(200,168,112,0.4); margin-left: 8px; }
    .final-output { margin-top: 40px; padding: 20px; background: rgba(0,0,0,0.5); border: 0.5px solid rgba(184,104,24,0.3); border-radius: 4px; }
    .final-output h2 { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: #b86818; margin-bottom: 12px; font-weight: 400; }
    .final-code { font-family: monospace; font-size: 11px; color: #9fe1cb; line-height: 1.8; white-space: pre-wrap; cursor: pointer; }
    .final-code:hover { background: rgba(31,158,117,0.05); }
    .tip { font-size: 11px; color: rgba(200,168,112,0.4); margin-top: 12px; line-height: 1.6; }
    .upload-area { padding: 16px; border-bottom: 0.5px solid rgba(200,168,112,0.1); }
    .upload-area input { font-size: 12px; color: rgba(200,168,112,0.6); }
  </style>
</head>
<body>

<h1>Studio Bjør — Divider Crop Editor</h1>

<div id="editors"></div>

<div class="final-output">
  <h2>Final CSS — copy into index.html</h2>
  <div class="final-code" id="final-code" onclick="copyFinal()">Adjust sliders above to generate CSS...</div>
  <p class="tip">Click the code to copy it. Paste these object-position values into your index.html divider img tags.</p>
</div>

<script>
  const dividers = [
    { id: 'divider1', label: 'Divider 1 — Before: The Studio', file: 'divider1.jpg' },
    { id: 'divider2', label: 'Divider 2 — Before: Services', file: 'divider2.jpg' },
    { id: 'divider3', label: 'Divider 3 — Before: Approach', file: 'divider3.jpg' },
    { id: 'divider4', label: 'Divider 4 — Before: Reviews', file: 'divider4.jpg' },
  ];

  const state = dividers.map(() => ({ x: 50, y: 50, height: 100, opacity: 90 }));

  function buildEditor(d, i) {
    const s = state[i];
    return `
      <div class="divider-editor" id="editor-${i}">
        <div class="editor-header">
          <span class="editor-title">${d.label}</span>
        </div>
        <div class="upload-area">
          <input type="file" accept="image/*" onchange="loadImage(${i}, this)" id="file-${i}">
        </div>
        <div class="preview-strip" id="strip-${i}" style="height:${s.height}px">
          <img id="img-${i}" src="${d.file}" style="object-position:${s.x}% ${s.y}%; opacity:${s.opacity/100};" onerror="this.style.display='none'">
        </div>
        <div class="controls">
          <div class="control-group">
            <label>Horizontal position <span class="val" id="xval-${i}">${s.x}%</span></label>
            <input type="range" min="0" max="100" value="${s.x}" oninput="update(${i},'x',this.value)">
          </div>
          <div class="control-group">
            <label>Vertical position <span class="val" id="yval-${i}">${s.y}%</span></label>
            <input type="range" min="0" max="100" value="${s.y}" oninput="update(${i},'y',this.value)">
          </div>
          <div class="control-group height-control">
            <label>Strip height <span class="val" id="hval-${i}">${s.height}px</span></label>
            <input type="range" min="40" max="300" value="${s.height}" oninput="update(${i},'height',this.value)">
          </div>
          <div class="control-group">
            <label>Opacity <span class="val" id="oval-${i}">${s.opacity}%</span></label>
            <input type="range" min="20" max="100" value="${s.opacity}" oninput="update(${i},'opacity',this.value)">
          </div>
        </div>
        <div class="output-box" id="css-${i}" onclick="copyCss(${i})">
          <span>object-position: ${s.x}% ${s.y}%; opacity: ${s.opacity/100};</span>
          <span class="copy-hint">click to copy</span>
        </div>
      </div>
    `;
  }

  document.getElementById('editors').innerHTML = dividers.map((d,i) => buildEditor(d,i)).join('');

  function update(i, prop, val) {
    state[i][prop] = parseFloat(val);
    const s = state[i];
    const img = document.getElementById(`img-${i}`);
    const strip = document.getElementById(`strip-${i}`);
    img.style.objectPosition = `${s.x}% ${s.y}%`;
    img.style.opacity = s.opacity / 100;
    strip.style.height = s.height + 'px';
    document.getElementById(`xval-${i}`).textContent = s.x + '%';
    document.getElementById(`yval-${i}`).textContent = s.y + '%';
    document.getElementById(`hval-${i}`).textContent = s.height + 'px';
    document.getElementById(`oval-${i}`).textContent = s.opacity + '%';
    document.getElementById(`css-${i}`).innerHTML = `<span>object-position: ${s.x}% ${s.y}%; opacity: ${s.opacity/100};</span><span class="copy-hint">click to copy</span>`;
    updateFinal();
  }

  function updateFinal() {
    const lines = dividers.map((d, i) => {
      const s = state[i];
      return `/* ${d.label} */\n.photo-divider:nth-of-type(${i+1}) { height: ${s.height}px; }\n.photo-divider:nth-of-type(${i+1}) img { object-position: ${s.x}% ${s.y}%; opacity: ${s.opacity/100}; }`;
    });
    document.getElementById('final-code').textContent = lines.join('\n\n');
  }

  function loadImage(i, input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById(`img-${i}`).src = e.target.result;
        document.getElementById(`img-${i}`).style.display = 'block';
      };
      reader.readAsDataURL(input.files[0]);
    }
  }

  function copyCss(i) {
    const s = state[i];
    navigator.clipboard.writeText(`object-position: ${s.x}% ${s.y}%; opacity: ${s.opacity/100};`);
  }

  function copyFinal() {
    navigator.clipboard.writeText(document.getElementById('final-code').textContent);
    document.getElementById('final-code').style.background = 'rgba(31,158,117,0.1)';
    setTimeout(() => document.getElementById('final-code').style.background = '', 800);
  }

  updateFinal();
</script>
</body>
</html>
